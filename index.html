<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Text Editor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource-helvetica-neue@4.0.0/index.css">

    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #f3f4f6;
        }
        .canvas-container {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0 auto;
            position: relative;
            background: white;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .tool-btn {
            transition: all 0.2s;
        }
        .tool-btn:hover {
            transform: translateY(-1px);
        }
        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
            <h1 class="text-xl font-semibold tracking-tight">PDF Text Editor</h1>
        </div>
        <div class="flex gap-3">
            <label for="file-upload" class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload PDF
            </label>
            <input id="file-upload" type="file" accept=".pdf" class="hidden">
            
            <button id="download-btn" disabled class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar Controls -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col overflow-y-auto z-10">
            <div class="p-6 space-y-6">
                
                <!-- Page Selector -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Page Selection</label>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <span class="text-slate-500 text-sm ml-2">Page</span>
                        <input type="number" id="page-num" value="1" min="1" class="w-16 bg-transparent font-semibold text-center focus:outline-none text-slate-800">
                        <span class="text-slate-400 text-sm">of <span id="page-count">--</span></span>
                    </div>
                </div>

                <!-- Text Input -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Text Content</label>
                    <textarea id="text-input" rows="4" placeholder="Type your text here..." class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-sm"></textarea>
                </div>

                <!-- Formatting Toolbar -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Formatting</label>
                    <div class="grid grid-cols-4 gap-2 mb-3">
                        <button id="btn-bold" class="tool-btn border border-slate-200 rounded p-2 text-slate-600 hover:bg-slate-50 flex justify-center items-center" title="Bold">
                            <span class="font-bold">B</span>
                        </button>
                        <button id="btn-italic" class="tool-btn border border-slate-200 rounded p-2 text-slate-600 hover:bg-slate-50 flex justify-center items-center" title="Italic">
                            <span class="italic">I</span>
                        </button>
                        <button id="btn-underline" class="tool-btn border border-slate-200 rounded p-2 text-slate-600 hover:bg-slate-50 flex justify-center items-center" title="Underline">
                            <span class="underline">U</span>
                        </button>
                        <div class="relative group">
                            <button class="w-full h-full border border-slate-200 rounded p-2 bg-white flex justify-center items-center hover:bg-slate-50">
                                <div id="color-preview" class="w-4 h-4 rounded-full bg-black border border-slate-300"></div>
                            </button>
                            <input type="color" id="color-picker" value="#000000" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        </div>
                    </div>
                    
                    <div class="flex gap-2">
                        <select id="font-size" class="flex-1 p-2 border border-slate-200 rounded text-sm bg-white focus:outline-none focus:border-blue-500">
                            <option value="12">12px</option>
                            <option value="14">14px</option>
                            <option value="16" selected>16px</option>
                            <option value="18">18px</option>
                            <option value="24">24px</option>
                            <option value="32">32px</option>
                            <option value="48">48px</option>
                            <option value="64">64px</option>
                        </select>
                        <select id="alignment" class="flex-1 p-2 border border-slate-200 rounded text-sm bg-white focus:outline-none focus:border-blue-500">
                            <option value="left">Left</option>
                            <option value="center">Center</option>
                            <option value="right">Right</option>
                        </select>
                    </div>
                </div>

                <!-- Position Controls -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Position (X, Y)</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <span class="absolute left-3 top-2.5 text-slate-400 text-xs">X</span>
                            <input type="number" id="pos-x" value="50" class="w-full pl-8 pr-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div class="relative flex-1">
                            <span class="absolute left-3 top-2.5 text-slate-400 text-xs">Y</span>
                            <input type="number" id="pos-y" value="50" class="w-full pl-8 pr-3 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">Coordinates are in pixels from bottom-left.</p>
                </div>

                <!-- Apply Button -->
                <button id="apply-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-lg font-medium shadow-lg shadow-slate-200 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Add Text to Page
                </button>

            </div>
            
            <div class="mt-auto p-4 border-t border-slate-100 bg-slate-50">
                <div class="text-xs text-slate-500 text-center">
                    Preview is for visualization only.<br>Final output generated on download.
                </div>
            </div>
        </aside>

        <!-- PDF Viewer Area -->
        <section class="flex-1 bg-slate-100 overflow-auto flex justify-center p-8 relative" id="viewer-container">
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-400">
                <svg class="w-16 h-16 mb-4 opacity-50" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p class="text-lg font-medium">No PDF loaded</p>
                <p class="text-sm">Upload a PDF file to start editing</p>
            </div>
            
            <div id="canvas-wrapper" class="hidden relative">
                <canvas id="the-canvas" class="border border-slate-300"></canvas>
                <!-- Overlay for visual feedback of added text could go here, but we'll just redraw canvas or use simple overlay -->
                <div id="preview-overlay" class="absolute pointer-events-none border border-dashed border-blue-400 bg-blue-50/50 px-2 py-1 text-sm hidden" style="transform-origin: bottom left;">
                    Preview Text
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- Configuration & State ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pdfBytes = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.5;
        let canvas = document.getElementById('the-canvas');
        let ctx = canvas.getContext('2d');
        
        // Store modifications per page: { pageIndex: [ {text, x, y, styles} ] }
        let modifications = {}; 

        // UI Elements
        const fileInput = document.getElementById('file-upload');
        const downloadBtn = document.getElementById('download-btn');
        const pageNumInput = document.getElementById('page-num');
        const pageCountSpan = document.getElementById('page-count');
        const emptyState = document.getElementById('empty-state');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const previewOverlay = document.getElementById('preview-overlay');
        
        // Inputs
        const textInput = document.getElementById('text-input');
        const fontSizeSelect = document.getElementById('font-size');
        const colorPicker = document.getElementById('color-picker');
        const colorPreview = document.getElementById('color-preview');
        const alignSelect = document.getElementById('alignment');
        const posXInput = document.getElementById('pos-x');
        const posYInput = document.getElementById('pos-y');
        
        // Toggles
        const btnBold = document.getElementById('btn-bold');
        const btnItalic = document.getElementById('btn-italic');
        const btnUnderline = document.getElementById('btn-underline');

        let currentStyles = {
            bold: false,
            italic: false,
            underline: false,
            color: '#000000',
            size: 16,
            align: 'left'
        };

        // --- Event Listeners ---

        // File Upload
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    pdfBytes = new Uint8Array(ev.target.result);
                    await loadPdf(pdfBytes);
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('Please upload a valid PDF file.');
            }
        });

        // Style Toggles
        const toggleStyle = (key, btn) => {
            currentStyles[key] = !currentStyles[key];
            btn.classList.toggle('active', currentStyles[key]);
            updatePreview();
        };

        btnBold.addEventListener('click', () => toggleStyle('bold', btnBold));
        btnItalic.addEventListener('click', () => toggleStyle('italic', btnItalic));
        btnUnderline.addEventListener('click', () => toggleStyle('underline', btnUnderline));

        // Other Inputs
        colorPicker.addEventListener('input', (e) => {
            currentStyles.color = e.target.value;
            colorPreview.style.backgroundColor = e.target.value;
            updatePreview();
        });

        fontSizeSelect.addEventListener('change', (e) => {
            currentStyles.size = parseInt(e.target.value);
            updatePreview();
        });

        alignSelect.addEventListener('change', (e) => {
            currentStyles.align = e.target.value;
            updatePreview();
        });

        [textInput, posXInput, posYInput].forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        // Page Navigation
        pageNumInput.addEventListener('change', (e) => {
            const val = parseInt(e.target.value);
            if (val >= 1 && val <= pdfDoc.numPages) {
                queueRenderPage(val);
            }
        });

        // Apply Button (Visual Only for now, logic happens on Download)
        document.getElementById('apply-btn').addEventListener('click', () => {
            if (!pdfDoc) return;
            
            // Save current input to memory for this page
            if (!modifications[pageNum]) modifications[pageNum] = [];
            
            // We don't actually "burn" it into the canvas immediately permanently, 
            // but we can add a visual marker or just rely on the live preview.
            // For this implementation, the "Apply" button confirms the settings 
            // and maybe adds a persistent marker if we wanted complex layering.
            // Here, we will just trigger the download logic preparation or alert success.
            
            // Let's make it feel responsive: Flash the preview
            previewOverlay.style.borderColor = '#22c55e'; // Green
            setTimeout(() => {
                previewOverlay.style.borderColor = '#60a5fa'; // Back to blue
            }, 300);
            
            // In a real app, we might push this specific state to an array of "stamps"
            // But for simplicity, we treat the inputs as the "current stamp" to be applied on download.
            // To support multiple texts, we'd need a list. Let's assume single text per page for simplicity 
            // OR append to the list. Let's append.
            
            modifications[pageNum].push({
                text: textInput.value,
                x: parseInt(posXInput.value),
                y: parseInt(posYInput.value),
                ...currentStyles
            });
            
            // Clear input for next entry? Or keep it? Let's keep it but maybe clear text.
            // textInput.value = ''; 
            // updatePreview();
            
            renderPage(pageNum); // Re-render to show "burned in" look if we wanted, 
                                 // but currently renderPage draws raw PDF. 
                                 // We need to draw modifications on canvas too.
        });

        // Download
        downloadBtn.addEventListener('click', generateAndDownloadPdf);


        // --- Core Functions ---

        async function loadPdf(data) {
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: data }).promise;
                pageCountSpan.textContent = pdfDoc.numPages;
                pageNum = 1;
                pageNumInput.value = 1;
                
                emptyState.classList.add('hidden');
                canvasWrapper.classList.remove('hidden');
                downloadBtn.disabled = false;
                
                renderPage(pageNum);
            } catch (error) {
                console.error('Error loading PDF:', error);
                alert('Failed to load PDF.');
            }
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        async function renderPage(num) {
            pageRendering = true;
            
            // Fetch page
            const page = await pdfDoc.getPage(num);
            
            // Calculate viewport
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            // Render PDF page into canvas context
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            
            await page.render(renderContext).promise;
            
            // Draw any existing modifications for this page on top of the canvas
            drawModificationsOnCanvas(num, viewport);

            pageRendering = false;
            
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
        }

        function drawModificationsOnCanvas(pageIdx, viewport) {
            const mods = modifications[pageIdx];
            if (!mods || mods.length === 0) return;

            ctx.save();
            
            mods.forEach(mod => {
                // PDF coordinates: (0,0) is bottom-left. 
                // Canvas coordinates: (0,0) is top-left.
                // We need to convert.
                // However, our inputs X/Y are user-defined "pixels from bottom-left".
                // So we map directly.
                
                const x = mod.x * scale; // Scale up user input to match canvas scale
                // Y needs inversion relative to canvas height
                const y = viewport.height - (mod.y * scale); 

                ctx.font = `${mod.italic ? 'italic' : ''} ${mod.bold ? 'bold' : ''} ${mod.size * scale}px Helvetica`;
                ctx.fillStyle = mod.color;
                ctx.textBaseline = 'bottom'; // Align to bottom of Y coordinate
                
                // Simple alignment handling for canvas drawing
                if (mod.align === 'center') {
                    ctx.textAlign = 'center';
                } else if (mod.align === 'right') {
                    ctx.textAlign = 'right';
                } else {
                    ctx.textAlign = 'left';
                }

                ctx.fillText(mod.text, x, y);
                
                if (mod.underline) {
                    const metrics = ctx.measureText(mod.text);
                    const width = metrics.width;
                    const height = mod.size * scale; // approx
                    
                    ctx.beginPath();
                    ctx.strokeStyle = mod.color;
                    ctx.lineWidth = 1;
                    // Adjust line position based on alignment
                    let startX = x;
                    if (mod.align === 'center') startX = x - width/2;
                    if (mod.align === 'right') startX = x - width;
                    
                    ctx.moveTo(startX, y + 2); // slightly below baseline
                    ctx.lineTo(startX + width, y + 2);
                    ctx.stroke();
                }
            });
            
            ctx.restore();
        }

        function updatePreview() {
            if (!pdfDoc) return;
            
            // Update the floating HTML overlay for immediate feedback without full re-render
            const text = textInput.value;
            if (!text) {
                previewOverlay.classList.add('hidden');
                return;
            }
            
            previewOverlay.classList.remove('hidden');
            previewOverlay.textContent = text;
            
            // Styles
            previewOverlay.style.fontSize = `${currentStyles.size}px`;
            previewOverlay.style.color = currentStyles.color;
            previewOverlay.style.fontWeight = currentStyles.bold ? 'bold' : 'normal';
            previewOverlay.style.fontStyle = currentStyles.italic ? 'italic' : 'normal';
            previewOverlay.style.textDecoration = currentStyles.underline ? 'underline' : 'none';
            previewOverlay.style.textAlign = currentStyles.align;
            
            // Position
            // The canvas is scaled by `scale`. The inputs are logical pixels.
            // We need to position the overlay div absolutely within the wrapper.
            // Wrapper size matches canvas size.
            
            const x = parseInt(posXInput.value) * scale;
            const y = parseInt(posYInput.value) * scale;
            
            // CSS Top/Left is from Top-Left. PDF Y is from Bottom-Left.
            // We need the height of the canvas.
            const canvasHeight = canvas.height;
            
            previewOverlay.style.left = `${x}px`;
            previewOverlay.style.top = `${canvasHeight - y}px`;
            
            // Adjust transform origin for alignment logic if needed, 
            // but simple absolute positioning usually works best with text-align inside the div
            // provided the div width is constrained or auto.
            // For right/center align to work visually in absolute pos, we might need to shift the div.
            if (currentStyles.align === 'center') {
                 // This is tricky with absolute div. Let's keep it simple: Left-aligned div, internal text aligned.
                 // User positions the "start" of the text box.
            }
        }

        async function generateAndDownloadPdf() {
            if (!pdfBytes) return;
            
            try {
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDocLib = await PDFDocument.load(pdfBytes);
                const helveticaFont = await pdfDocLib.embedFont(StandardFonts.Helvetica);
                const helveticaBold = await pdfDocLib.embedFont(StandardFonts.HelveticaBold);
                const helveticaOblique = await pdfDocLib.embedFont(StandardFonts.HelveticaOblique);
                const helveticaBoldOblique = await pdfDocLib.embedFont(StandardFonts.HelveticaBoldOblique);

                const pages = pdfDocLib.getPages();
                
                // Iterate through all pages that have modifications
                for (const [pageIndexStr, mods] of Object.entries(modifications)) {
                    const pageIndex = parseInt(pageIndexStr) - 1; // 0-based index
                    if (pageIndex < 0 || pageIndex >= pages.length) continue;
                    
                    const page = pages[pageIndex];
                    const { width, height } = page.getSize();
                    
                    mods.forEach(mod => {
                        // Select Font
                        let font = helveticaFont;
                        if (mod.bold && mod.italic) font = helveticaBoldOblique;
                        else if (mod.bold) font = helveticaBold;
                        else if (mod.italic) font = helveticaOblique;
                        
                        // Parse Color
                        const r = parseInt(mod.color.slice(1, 3), 16) / 255;
                        const g = parseInt(mod.color.slice(3, 5), 16) / 255;
                        const b = parseInt(mod.color.slice(5, 7), 16) / 255;
                        const colorRgb = rgb(r, g, b);
                        
                        // Draw Text
                        // Note: pdf-lib coordinates are bottom-left based, which matches our input logic.
                        page.drawText(mod.text, {
                            x: mod.x,
                            y: mod.y,
                            size: mod.size,
                            font: font,
                            color: colorRgb,
                            align: mod.align === 'center' ? 'center' : (mod.align === 'right' ? 'right' : 'left'),
                        });
                        
                        // Handle Underline manually as pdf-lib doesn't support it natively in drawText options easily
                        if (mod.underline) {
                            // Approximate width calculation is hard without embedding a font subset or measuring.
                            // pdf-lib has font.widthOfTextAtSize
                            const textWidth = font.widthOfTextAtSize(mod.text, mod.size);
                            const textHeight = font.heightAtSize(mod.size);
                            
                            let startX = mod.x;
                            if (mod.align === 'center') startX = mod.x - (textWidth / 2);
                            if (mod.align === 'right') startX = mod.x - textWidth;
                            
                            page.drawLine({
                                start: { x: startX, y: mod.y - 2 }, // Slightly below baseline
                                end: { x: startX + textWidth, y: mod.y - 2 },
                                thickness: 1,
                                color: colorRgb,
                            });
                        }
                    });
                }
                
                const pdfDataUri = await pdfDocLib.saveAsBase64({ dataUri: true });
                const link = document.createElement('a');
                link.href = pdfDataUri;
                link.download = 'edited-document.pdf';
                link.click();
                
            } catch (err) {
                console.error(err);
                alert('Error generating PDF. Check console for details.');
            }
        }

    </script>
</body>
</html>
